---
layout: default
---

{% include custom-style.html %}
{% include site-nav.html %}

<article class="page-shell">
    <header class="page-heading">
        {% if page.kicker %}
        <p class="page-kicker">{{ page.kicker }}</p>
        {% endif %}
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-lead">{{ page.description }}</p>
        {% endif %}
    </header>

    {{ content }}
</article>
