---
layout: default
---

{% include site-nav.html %}

{% assign current_lang = page.lang | default: site.lang | default: 'en-US' %}

<article class="page-shell post-shell" lang="{{ current_lang }}">
    <header class="page-heading page-heading-post">
        <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
        <h1>{{ page.title }}</h1>
    </header>

    {{ content }}
</article>
