---
layout: default
---

{% include custom-style.html %}
{% include site-nav.html %}

<article class="page-shell post-shell">
    <header class="page-heading">
        <p class="page-kicker">Post</p>
        <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
        <h1>{{ page.title }}</h1>
        {% if page.excerpt %}
        <p class="page-lead">{{ page.excerpt | strip_html }}</p>
        {% endif %}
    </header>

    {{ content }}
</article>
